name: Build and Package

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      - name: Bootstrap vcpkg
        run: External\vcpkg\bootstrap-vcpkg.bat

      - name: Configure
        run: cmake --preset x64-Release

      - name: Build
        run: cmake --build build/x64-Release

      - name: Package
        run: Compress-Archive -Path build/x64-Release/HitmanAbsolutionEditor.exe,build/x64-Release/*.dll,build/x64-Release/assets -DestinationPath HitmanAbsolutionEditor.zip

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Build ${{ steps.sha.outputs.short }}
          files: HitmanAbsolutionEditor.zip
